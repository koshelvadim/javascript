<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <ul>
        <li>
            <button>Кнопка</button>
        </li>
        <li>
            <button>Кнопка</button>
        </li>
        <li>
            <button>Кнопка</button>
        </li>
    </ul>

    <!-- Задание. Назначьте обработчик клика по ul и при клике выводите в консоль
    элемент, на котором произошел клик, с помощью event.target, где event - это
    объект события, передаваемый в функцию-обработчик клика. -->

    <script>

        "use strict";

        let i = 1; // глобальная переменная для номера класса button
        let j = 1; // глобальная переменная для номера класса li
        //получаем список всех button 
        let listTegs = document.querySelectorAll('button');
        //присваиваем button разные классы для их идентификации
        listTegs.forEach(function(teg){
            teg.classList.add(`classButton${i}`);
            i++;
        });
        //получаем список всех li
        let listTegsLi = document.querySelectorAll('li');
        //присваиваем li разные классы для их идентификации
        listTegsLi.forEach(function(teg){
            teg.classList.add(`classLi${j}`);
            j++;
        });
        //делаем обработчик клика по тегу ul
        let tegUl = document.querySelector('ul');

        tegUl.addEventListener('click', function(event){
            console.dir(event.target); //выводим в консоль элемент на котором произошел rkbr
        });
    

    </script>
</body>
</html>

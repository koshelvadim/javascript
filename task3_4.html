<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework</title>
</head>

<body>
  <script>

    'use strict';

    function getSumma() {
      let summa = a + b;
      return summa;
    }

    function getSubtract() {
      let subtract = a - b;
      return subtract;
    }

    function getMultiply() {
      let multiply = a * b;
      return multiply;
    }

    function getDivsion() {
      let division = a / b;
      return division;
    }
    
    let a = +prompt("Введите первое число");
    let b = +prompt("Введите второе число");

    let resultSumma = getSumma();
    let resultSubtract = getSubtract();
    let resultMltiply = getMultiply();
    let resultDivision = getDivsion();

    alert(`Сумма чисел равна ${resultSumma}`);
    alert(`Разность чисел равна ${resultSubtract}`);
    alert(`Произведение чисел равно ${resultMltiply}`);
    alert(`Частное чисел равно ${resultDivision}`);

  </script>
</body>

</html>

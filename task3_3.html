<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework</title>
</head>

<body>
  <script>

    'use strict';

    const products = [
       {id: 3, 
        price: 200,}, 
       {id: 4, 
         price: 900,}, 
       {id: 1, 
        price: 1000,}, 
      ];

    let discount = 0.85; // скидка 15%

    products.forEach(function(number){
        console.log(`Была цена - ${number.price}`);
        number.price = number.price * discount;
        console.log(`Стала цена со скидкой 15% - ${number.price}`);
      }
    );
    console.log(products); // вывод массива с ценой со скидкой
    

  </script>
</body>

</html>

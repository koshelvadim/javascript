<body>
  <script>

    'use srtict';
      
      let result1 = 10 + 10 + "10"; 
      console.log(result1); // число 10 складываем с числом 10 получаем число 20 и конкатенация со строкой "10" дает строку 2010

      let result2 = 10 + "10" + 10;
      console.log(result2); // конкатенация числа 10 строки "10" дает строку "1010" и конкатеначия с числом 10 дает строку 101010

      let result3 = 10 + 10 + + "10";
      console.log(result3); // число 10 складываем с числом 10 получаем число 20, унарный плюс переводит строку "10" в число 10 и сложив числа 10 и 20 получает число 30

      let result4 = 10 / -"";
      console.log(result4); // унарный минус пустой строки дает -0, а деление числа 10 на -0 дает -Infinity

      let result5 = 10 / +"2,5";
      console.log(result5); // унарный плюс переводит строку "2,5" в неожиданное число, т.к. использована запятая, а деление числа 10 на неожиданное число приводит к Not a Number

  </script>

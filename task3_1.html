<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
</head>

<body>
    <script>
    
        'use strict';

        let a = 1, b = 1, c, d; // объявление переменных и присвсвоения им a = 1, b = 1, c = undefined, d = undefined
        c = ++a;                // переменная а увеличится на единицу и в переменную с запишется 2
        alert(c);               // вывод значения переменной с 2

        d = b++;                // в переменную d запишется значение b, а потом b увеличится на единицу
        alert(d);               // вывод значения пременной d 1

        c = 2 + ++a;            // переменная а увеличится на единицу будет 3 и плюс 2, в переменную с запишется 5
        alert(c);               // вывод значения переменной с 5
        
        d = 2 + b++;            // в пременной b было 2 плюс еще 2, в переменную d запишется 4, потом пременная b увеличится на единицу ибудет равна 3
        alert(d);               // вывод значения переменной d 4
        alert(a);               // вывод значения переменной a 3
        alert(b);               // вывод значения переменной b 3

    </script>
</body>

</html>
